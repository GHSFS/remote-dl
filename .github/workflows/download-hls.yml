name: hls

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Input"
        required: true
      filename:
        description: "Filename"
        required: false
        default: ""
      folder:
        description: "Subdir"
        required: false
        default: ""
      live:
        description: "Live mode"
        required: false
        default: "false"
      notify_id:
        description: "Tracking id"
        required: false
        default: ""

permissions:
  contents: read

env:
  API_URL: https://remote-dl.zoooaesooo.workers.dev

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONF }}
    steps:
      - name: Pre-process
        env:
          INPUT: ${{ inputs.url }}
        run: |
          set -e
          if [[ "$INPUT" == ref:* ]]; then
            TOKEN="${INPUT#ref:}"
            echo "::add-mask::$TOKEN"
            RESPONSE=$(curl -sS -X POST "$API_URL/resolve" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}")
            ACTUAL=$(printf '%s' "$RESPONSE" | jq -r '.url // empty')
            if [ -z "$ACTUAL" ]; then
              echo "lookup failed"
              exit 1
            fi
            echo "::add-mask::$ACTUAL"
            echo "URL=$ACTUAL" >> $GITHUB_ENV
          else
            echo "::add-mask::$INPUT"
            echo "URL=$INPUT" >> $GITHUB_ENV
          fi

      - name: Pre-process B
        env:
          FILENAME: ${{ inputs.filename }}
        run: |
          [ -n "$FILENAME" ] && echo "::add-mask::$FILENAME" || true

      - name: Cache tools
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/rclone
          key: tools-v1-${{ runner.os }}

      - name: Setup tools
        run: |
          set -e
          # rclone — cached if available
          if [ ! -x /usr/local/bin/rclone ]; then
            curl -sLo /tmp/rclone.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
            unzip -q /tmp/rclone.zip -d /tmp
            sudo mv /tmp/rclone-*-linux-amd64/rclone /usr/local/bin/
          fi
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF_DATA" > ~/.config/rclone/rclone.conf
          # ffmpeg — pre-installed on ubuntu-latest
          ffmpeg -version | head -1
          # yt-dlp — always fetch latest (single binary, ~1s, sites change frequently)
          sudo curl -sL -o /usr/local/bin/yt-dlp \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp
          rclone version | head -1
          yt-dlp --version

      - name: Sync
        run: |
          rclone lsd onedrive: --max-depth 1 > /dev/null
          echo "ok"

      - name: Hook
        if: inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"start\",\"notify_id\":\"$NOTIFY_ID\",\"run_id\":\"$RUN_ID\",\"run_number\":$RUN_NUMBER}" || true

      - name: Run
        env:
          FILENAME: ${{ inputs.filename }}
          FOLDER: ${{ inputs.folder }}
          LIVE: ${{ inputs.live }}
        run: |
          set -e
          if [ -z "$FILENAME" ]; then
            FILENAME="$(date +%Y%m%d_%H%M%S)"
          fi
          case "$FILENAME" in
            *.mp4) ;;
            *) FILENAME="${FILENAME}.mp4" ;;
          esac
          echo "::add-mask::$FILENAME"
          if [ -z "$FOLDER" ]; then
            DEST="onedrive:$FILENAME"
          else
            DEST="onedrive:$FOLDER/$FILENAME"
          fi
          echo "DEST=$DEST" >> $GITHUB_ENV
          echo "FINAL_FILENAME=$FILENAME" >> $GITHUB_ENV
          LIVE_FLAG=""
          if [ "$LIVE" = "true" ]; then
            LIVE_FLAG="--live-from-start --hls-use-mpegts"
          fi
          yt-dlp --no-progress --no-warnings --quiet \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --concurrent-fragments 16 \
            --merge-output-format mp4 \
            --remux-video mp4 \
            -f "bv*+ba/b" \
            $LIVE_FLAG \
            -o - \
            "$URL" \
            | rclone rcat "$DEST" \
              --onedrive-chunk-size 100M \
              --stats=30s --stats-one-line -q

      - name: Hook done
        if: success() && inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
        run: |
          SIZE=0
          if [ -n "$DEST" ]; then
            SIZE=$(rclone size "$DEST" --json 2>/dev/null | jq -r '.bytes // 0' 2>/dev/null || echo 0)
          fi
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"done\",\"notify_id\":\"$NOTIFY_ID\",\"bytes\":$SIZE,\"filename\":\"$FINAL_FILENAME\"}" || true

      - name: Hook fail
        if: failure() && inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
        run: |
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"failed\",\"notify_id\":\"$NOTIFY_ID\",\"error\":\"step failed\"}" || true

      - name: Update config
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_CONF=$(cat ~/.config/rclone/rclone.conf 2>/dev/null || echo "")
          if [ -n "$NEW_CONF" ] && [ "$NEW_CONF" != "$RCLONE_CONF_DATA" ]; then
            gh secret set RCLONE_CONF --body "$NEW_CONF" --repo ${{ github.repository }}
            echo "updated"
          else
            echo "ok"
          fi
