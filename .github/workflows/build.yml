name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build rdl.exe (x64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify binary
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/rdl.exe"
          if (-not (Test-Path $exe)) { throw "binary not found" }
          $size = (Get-Item $exe).Length
          Write-Host "Built $exe ($size bytes)"
          & $exe --version

      - name: Stage release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/rdl.exe dist/rdl-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-x64
          path: target/x86_64-pc-windows-msvc/release/rdl.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rdl-x64.exe
          generate_release_notes: true
