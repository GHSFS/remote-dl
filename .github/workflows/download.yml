name: build

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Input"
        required: true
      filename:
        description: "Filename"
        required: false
        default: ""
      folder:
        description: "Subdir"
        required: false
        default: ""
      notify_id:
        description: "Tracking id"
        required: false
        default: ""
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: read

env:
  API_URL: https://remote-dl.zoooaesooo.workers.dev

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONF }}
    steps:
      - name: Init
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Scheduled keep-alive run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Pre-process
        if: steps.mode.outputs.skip == 'false'
        env:
          INPUT: ${{ inputs.url }}
        run: |
          set -e
          if [[ "$INPUT" == ref:* ]]; then
            TOKEN="${INPUT#ref:}"
            echo "::add-mask::$TOKEN"
            RESPONSE=$(curl -sS -X POST "$API_URL/resolve" \
              -H "content-type: application/json" \
              -d "{\"token\":\"$TOKEN\"}")
            ACTUAL=$(printf '%s' "$RESPONSE" | jq -r '.url // empty')
            if [ -z "$ACTUAL" ]; then
              echo "lookup failed"
              exit 1
            fi
            echo "::add-mask::$ACTUAL"
            echo "URL=$ACTUAL" >> $GITHUB_ENV
          else
            echo "::add-mask::$INPUT"
            echo "URL=$INPUT" >> $GITHUB_ENV
          fi

      - name: Pre-process B
        if: steps.mode.outputs.skip == 'false'
        env:
          FILENAME: ${{ inputs.filename }}
        run: |
          [ -n "$FILENAME" ] && echo "::add-mask::$FILENAME" || true

      - name: Cache tools
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/rclone
          key: tools-v1-${{ runner.os }}

      - name: Setup tools
        run: |
          set -e
          if [ ! -x /usr/local/bin/rclone ]; then
            curl -sLo /tmp/rclone.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
            unzip -q /tmp/rclone.zip -d /tmp
            sudo mv /tmp/rclone-*-linux-amd64/rclone /usr/local/bin/
          fi
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONF_DATA" > ~/.config/rclone/rclone.conf
          rclone version | head -1

      - name: Sync
        run: |
          rclone lsd onedrive: --max-depth 1 > /dev/null
          echo "ok"

      - name: Hook
        if: steps.mode.outputs.skip == 'false' && inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"start\",\"notify_id\":\"$NOTIFY_ID\",\"run_id\":\"$RUN_ID\",\"run_number\":$RUN_NUMBER}" || true

      - name: Run
        if: steps.mode.outputs.skip == 'false'
        env:
          FILENAME: ${{ inputs.filename }}
          FOLDER: ${{ inputs.folder }}
        run: |
          set -e
          if [ -z "$FILENAME" ]; then
            FILENAME=$(basename "${URL%%\?*}")
          fi
          if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
            FILENAME="out_$(date +%s)"
          fi
          echo "::add-mask::$FILENAME"
          if [ -z "$FOLDER" ]; then
            DEST="onedrive:$FILENAME"
          else
            DEST="onedrive:$FOLDER/$FILENAME"
          fi
          echo "DEST=$DEST" >> $GITHUB_ENV
          echo "FINAL_FILENAME=$FILENAME" >> $GITHUB_ENV
          curl -sSL \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --retry 3 --retry-delay 5 \
            "$URL" | rclone rcat "$DEST" \
            --onedrive-chunk-size 100M \
            --stats=30s \
            --stats-one-line

      - name: Hook done
        if: success() && steps.mode.outputs.skip == 'false' && inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
        run: |
          SIZE=0
          if [ -n "$DEST" ]; then
            SIZE=$(rclone size "$DEST" --json 2>/dev/null | jq -r '.bytes // 0' 2>/dev/null || echo 0)
          fi
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"done\",\"notify_id\":\"$NOTIFY_ID\",\"bytes\":$SIZE,\"filename\":\"$FINAL_FILENAME\"}" || true

      - name: Hook fail
        if: failure() && steps.mode.outputs.skip == 'false' && inputs.notify_id != ''
        env:
          NOTIFY_ID: ${{ inputs.notify_id }}
        run: |
          curl -sS -X POST "$API_URL/notify" \
            -H "content-type: application/json" \
            -d "{\"event\":\"failed\",\"notify_id\":\"$NOTIFY_ID\",\"error\":\"step failed\"}" || true

      - name: Update config
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_CONF=$(cat ~/.config/rclone/rclone.conf 2>/dev/null || echo "")
          if [ -n "$NEW_CONF" ] && [ "$NEW_CONF" != "$RCLONE_CONF_DATA" ]; then
            gh secret set RCLONE_CONF --body "$NEW_CONF" --repo ${{ github.repository }}
            echo "updated"
          else
            echo "ok"
          fi
